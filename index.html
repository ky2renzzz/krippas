<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>KRIPPAS — AI REIGNS PROTOCOL</title>
  <meta name="description" content="A Reigns-style deep narrative branching game where you become Elon Musk, Sam Altman, Dario Amodei, Demis Hassabis, or Zhipu AI founder. Make critical choices to balance tech, safety, hype, and money.">

  <!-- Open Graph / Link Preview -->
  <!-- ⚠️ Gotta host the OG image somewhere and update the URLs below!
       Use the og-image-generator.html tool to make it with your photo. -->
  <meta property="og:title" content="KRIPPAS — AI REIGNS PROTOCOL">
  <meta property="og:description" content="Branching narrative game. Choose your AI emperor. Balance tech, safety, hype & money.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ky2renzzz.github.io/krippas/">
  <meta property="og:site_name" content="KRIPPAS">
  <meta property="og:locale" content="en_US">
  <meta property="og:image" content="og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="KRIPPAS — AI REIGNS PROTOCOL">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="KRIPPAS — AI REIGNS PROTOCOL">
  <meta name="twitter:description" content="Branching narrative game. Choose your AI emperor.">
  <meta name="twitter:image" content="og-image.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <script>
    // Restore theme immediately to prevent flash
    (function() {
      var t = localStorage.getItem('krippas-theme');
      if (t === 'light') document.documentElement.classList.add('light');
    })();
  </script>
</head>
<body>

  <!-- Ambient dynamic background landscape scene -->
  <div class="bg-scene" id="bg-scene"></div>

  <!-- Game Container -->
  <div class="game-container">
    


    <!-- Center Viewport (The interactive terminal-like layout) -->
    <div class="viewport" id="game-viewport">
      
      <!-- Top header status indicators — rack LED style -->
      <div class="stats-header">
        <div class="stat-indicator" id="stat-safety" title="Safety & Alignment">
          <span class="change-dot"></span>
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="stat-svg" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3L4 7v5c0 4.5 3.2 8.5 8 9.5 4.8-1 8-5 8-9.5V7l-8-4z"/>
              <path d="M9 12l2 2 4-4"/>
            </svg>
          </span>
          <div class="bar-track">
            <div class="bar-container"><div class="bar-fill" style="height: 50%;"></div></div>

          </div>
          <span class="stat-label">SAFE</span>
        </div>

        <div class="stat-indicator" id="stat-hype" title="Hype & Public Relations">
          <span class="change-dot"></span>
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="stat-svg" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="3"/>
              <path d="M5.5 19c1.4-3 3.7-4.5 6.5-4.5s5.1 1.5 6.5 4.5"/>
            </svg>
          </span>
          <div class="bar-track">
            <div class="bar-container"><div class="bar-fill" style="height: 50%;"></div></div>

          </div>
          <span class="stat-label">HYPE</span>
        </div>

        <div class="stat-indicator" id="stat-compute" title="Compute & Scale">
          <span class="change-dot"></span>
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="stat-svg" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="5" y="4" width="14" height="12" rx="1"/>
              <path d="M9 16v4M15 16v4"/>
              <path d="M7 8h10M7 11h10"/>
            </svg>
          </span>
          <div class="bar-track">
            <div class="bar-container"><div class="bar-fill" style="height: 50%;"></div></div>

          </div>
          <span class="stat-label">GPU</span>
        </div>

        <div class="stat-indicator" id="stat-capital" title="Capital & Valuation">
          <span class="change-dot"></span>
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="stat-svg" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="7"/>
              <path d="M12 7v10M9.5 9.5c.7-1 2.8-1.4 3.8-.3.8.9.3 2-1.1 2.5l-2.4.8c-1.4.5-1.8 1.7-1 2.7 1 1.2 3.2.9 4.1-.2"/>
            </svg>
          </span>
          <div class="bar-track">
            <div class="bar-container"><div class="bar-fill" style="height: 50%;"></div></div>

          </div>
          <span class="stat-label">CASH</span>
        </div>
      </div>

      <!-- Center Deck Area -->
      <div class="deck-area">
        
        <!-- Welcome Screen — terminal boot sequence feel -->
        <div id="screen-welcome" class="screen active">
          <div class="brand">
            <h1>KRIPPAS</h1>
            <p class="subtitle">AI REIGNS PROTOCOL</p>
          </div>
          
          <div class="intro-art">
            <svg viewBox="0 0 100 100" style="width:100%; height:100%;">
              <rect x="0" y="0" width="100" height="100" fill="var(--background)"/>
              <rect x="0" y="0" width="100" height="100" fill="none" stroke="var(--border)" stroke-width="1"/>
              <polygon points="50,20 74,38 74,64 50,82 26,64 26,38" fill="none" stroke="var(--text-secondary)" stroke-width="0.8"/>
              <polygon points="50,28 66,42 66,60 50,72 34,60 34,42" fill="none" stroke="var(--text-primary)" stroke-width="0.6" opacity="0.3"/>
              <circle cx="50" cy="50" r="3" fill="var(--text-primary)" opacity="0.5"/>
            </svg>
          </div>

          <p class="flavor-text">
            AGI approaches. The race to define human consciousness is in the hands of five emperors. Take the assessment to claim your destiny.
          </p>
          
          <button id="btn-start-quiz" class="btn btn-filled">START ASSESSMENT</button>
        </div>

        <!-- Quiz Screen — diagnostic mode -->
        <div id="screen-quiz" class="screen">
          <div class="quiz-progress-bar">
            <div class="progress-fill" id="quiz-progress" style="width: 0%;"></div>
          </div>
          <h3 class="quiz-title">ALIGNMENT</h3>
          <div class="quiz-question-container">
            <p id="quiz-question-text"></p>
          </div>
          <div class="quiz-options">
            <button id="quiz-opt-left" class="btn quiz-btn"></button>
            <button id="quiz-opt-right" class="btn quiz-btn"></button>
          </div>
        </div>

        <!-- Assignment / Character Reveal Screen -->
        <div id="screen-reveal" class="screen">

          <div class="reveal-portrait-container" id="reveal-portrait">
            <!-- Dynamic character SVG here -->
          </div>
          <h2 id="reveal-name"></h2>
          <p id="reveal-role" class="reveal-role-tag"></p>
          <p id="reveal-description"></p>
          <button id="btn-start-game" class="btn btn-filled">ENTER PROTOCOL</button>
        </div>

        <!-- Gameplay Screen — terminal interaction -->
        <div id="screen-game" class="screen">
          <div class="dialogue-box">
            <div class="dialogue-speaker" id="speaker-name"></div>
            <p id="dialogue-text"></p>
          </div>

          <div class="card-wrapper" id="card-wrapper">
            <div class="reigns-card" id="main-card">
              <div class="choice-stamp left" id="stamp-left">
                <span class="stamp-dir">&#9664;</span>
                <span class="stamp-text" id="indicator-left"></span>
              </div>
              <div class="choice-stamp right" id="stamp-right">
                <span class="stamp-dir">&#9654;</span>
                <span class="stamp-text" id="indicator-right"></span>
              </div>
              <div class="card-art" id="card-portrait"></div>
              <div class="card-label">
                <span id="card-speaker-label"></span>
              </div>
            </div>
          </div>

          <div class="swipe-hint" id="swipe-hint">&lt; &mdash; &gt;</div>
        </div>

        <!-- Game Over Screen — system crash -->
        <div id="screen-gameover" class="screen">
          <h2 class="gameover-title">OFFLINE</h2>
          <div class="gameover-art" id="gameover-portrait">
            <!-- Dead/Shutdown SVG -->
          </div>
          <p id="gameover-text"></p>
          <button id="btn-restart" class="btn btn-filled">REBOOT PROTOCOL</button>
        </div>

      </div>

      <!-- Bottom HUD status -->
      <div class="hud-footer">
        <div class="player-identity">
          <span id="hud-player-name">—</span>
          <span class="separator">/</span>
          <span id="hud-player-role">—</span>
        </div>
        <div class="time-in-power">
          <span id="hud-time-val">0</span>
          <span id="hud-time-unit">QUARTERS</span>
        </div>
      </div>

    </div>

    <!-- Right panel: Objectives and controls -->
    <div class="side-panel right-panel">
      <div class="noise-content">
        <div class="objectives-checklist" id="objectives-checklist">
          <!-- Generated objectives based on character -->
        </div>
      </div>
      <div class="audio-control">
        <button id="btn-toggle-sound">ON</button>
        <button id="btn-toggle-theme" class="theme-btn" title="Toggle theme">☾</button>
      </div>
    </div>

  </div>

  <script src="data.js"></script>
  <script src="story.js"></script>
  <script src="backgrounds.js"></script>
  <script src="app.js"></script>

  <script>
    // Theme toggle — also clears inline styles from app.js applyTheme
    (function() {
      var btn = document.getElementById('btn-toggle-theme');
      if (!btn) return;
      var html = document.documentElement;
      var bgScene = document.getElementById('bg-scene');

      function updateBtn() {
        btn.textContent = html.classList.contains('light') ? '☀' : '☾';
      }
      updateBtn();

      function clearInlineThemeStyles() {
        // Remove inline CSS vars set by applyTheme() that override :root/.light
        var props = ['--bg-color', '--panel-bg', '--card-border', '--text-dark', '--sky-color'];
        props.forEach(function(p) { html.style.removeProperty(p); });
        if (bgScene) bgScene.style.removeProperty('background-color');
      }

      btn.addEventListener('click', function() {
        html.classList.toggle('light');
        var isLight = html.classList.contains('light');
        if (isLight) clearInlineThemeStyles();
        localStorage.setItem('krippas-theme', isLight ? 'light' : 'dark');
        updateBtn();
      });
    })();
  </script>
</body>
</html>
